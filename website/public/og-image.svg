<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark backdrop matching the live site -->
    <linearGradient id="ogBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0c14"/>
    </linearGradient>
    <!-- Aurora pool under the schematic, low opacity blue -->
    <radialGradient id="ogAurora" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#4f8bff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#4f8bff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4f8bff" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle blueprint grid -->
    <pattern id="ogGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <marker id="ogArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
    <marker id="ogArrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f8bff"/>
    </marker>
  </defs>

  <!-- Layer 0: backdrop + ambient glow + grid -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogAurora)"/>
  <rect width="1200" height="630" fill="url(#ogGrid)"/>

  <!-- Layer 1: top-left brand mark + figure caption -->
  <g transform="translate(48, 56)">
    <g fill="#4f8bff">
      <rect x="0"  y="10" width="8" height="22" rx="4"/>
      <rect x="14" y="0"  width="8" height="42" rx="4"/>
      <rect x="28" y="4"  width="8" height="34" rx="4"/>
      <rect x="42" y="10" width="8" height="22" rx="4"/>
    </g>
    <text x="64" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="700"
          font-size="28" fill="#ffffff" letter-spacing="-0.6">Pace</text>
  </g>
  <text x="48" y="100" font-family="ui-monospace, monospace" font-size="11"
        fill="rgba(255,255,255,0.4)" letter-spacing="2">FIG.1 — ON-DEVICE PIPELINE</text>
  <line x1="48" y1="110" x2="240" y2="110" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Layer 2: editorial headline (Instrument Serif vibe) -->
  <text x="48" y="222" font-family="'Instrument Serif', Georgia, serif" font-weight="400"
        font-size="76" fill="#ffffff" letter-spacing="-1.2">
    <tspan x="48" dy="0">I got tired of </tspan>
    <tspan font-style="italic" fill="#4f8bff">Siri.</tspan>
  </text>
  <text x="48" y="304" font-family="'Instrument Serif', Georgia, serif" font-weight="400"
        font-size="76" fill="#ffffff" letter-spacing="-1.2">
    <tspan x="48" dy="0">So I made one that </tspan>
  </text>
  <text x="48" y="384" font-family="'Instrument Serif', Georgia, serif" font-weight="400" font-style="italic"
        font-size="76" fill="#4f8bff" letter-spacing="-1.2">stays on my Mac.</text>

  <!-- Layer 3: schematic on the right — compressed for OG dimensions -->
  <g transform="translate(660, 130)">
    <!-- "YOUR MAC" boundary box -->
    <rect x="0" y="0" width="500" height="340" rx="4"
          fill="none" stroke="rgba(52,211,153,0.35)" stroke-width="0.8" stroke-dasharray="5 5"/>
    <text x="500" y="-6" text-anchor="end" font-family="ui-monospace, monospace" font-size="10"
          fill="rgba(52,211,153,0.7)" letter-spacing="2">YOUR MAC ──────────</text>

    <!-- ASR block -->
    <rect x="30" y="40" width="160" height="64" rx="3"
          fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="110" y="68" text-anchor="middle" font-family="'Instrument Serif', serif"
          font-size="20" fill="white" font-style="italic">WhisperKit</text>
    <text x="110" y="86" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="9" fill="rgba(255,255,255,0.5)">large-v3 · ANE</text>

    <!-- Planner block (centerpiece, accent) -->
    <rect x="30" y="138" width="280" height="100" rx="3"
          fill="rgba(11,11,13,0.85)" stroke="#4f8bff" stroke-width="1.5"/>
    <text x="170" y="170" text-anchor="middle" font-family="'Instrument Serif', serif"
          font-size="26" fill="#4f8bff" font-style="italic">Planner</text>
    <text x="170" y="192" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="10" fill="rgba(255,255,255,0.6)">Qwen3-4B-Instruct-2507 · bf16</text>
    <text x="170" y="218" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="9" fill="rgba(255,255,255,0.5)">plan-then-execute</text>

    <!-- Action executor -->
    <rect x="350" y="138" width="130" height="100" rx="3"
          fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="415" y="180" text-anchor="middle" font-family="'Instrument Serif', serif"
          font-size="18" fill="white" font-style="italic">Action</text>
    <text x="415" y="200" text-anchor="middle" font-family="'Instrument Serif', serif"
          font-size="18" fill="white" font-style="italic">Executor</text>

    <!-- Wires -->
    <g fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1">
      <path d="M 110 104 L 110 138" marker-end="url(#ogArrow)"/>
    </g>
    <g fill="none" stroke="#4f8bff" stroke-width="1.5">
      <path d="M 310 188 L 350 188" marker-end="url(#ogArrowAccent)"/>
    </g>

    <!-- Output indicator -->
    <text x="250" y="280" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="10" fill="rgba(52,211,153,0.8)" letter-spacing="2">✓ 0 BYTES OFF-DEVICE</text>
  </g>

  <!-- Layer 4: bottom row — price + key facts -->
  <g transform="translate(48, 540)">
    <rect width="180" height="50" rx="10" fill="#4f8bff"/>
    <text x="90" y="33" text-anchor="middle"
          font-family="Inter, -apple-system, sans-serif" font-weight="700"
          font-size="22" fill="#ffffff">$29 once</text>
  </g>
  <g transform="translate(248, 540)">
    <rect width="320" height="50" rx="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <circle cx="22" cy="25" r="5" fill="#34d399"/>
    <text x="40" y="33" font-family="Inter, -apple-system, sans-serif" font-weight="500"
          font-size="16" fill="#ffffff">100% on-device · macOS 14+ · Apple Silicon</text>
  </g>

  <!-- Layer 5: bottom-right URL -->
  <text x="1152" y="572" text-anchor="end" font-family="ui-monospace, monospace"
        font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="2">pace.app</text>
</svg>
